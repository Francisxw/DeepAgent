version: '3.8'

services:
  # ============================================
  # Redis - 会话缓存 / Token黑名单 / 上下文卸载
  # ============================================
  redis:
    image: redis:7
    container_name: deepagent-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepagent-network

  # ============================================
  # MongoDB - 对话历史持久化
  # ============================================
  mongodb:
    image: mongo:7
    container_name: deepagent-mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-chat_memory_db}
    volumes:
      - ./data/mongodb:/data/db
      - ./data/mongodb-config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepagent-network

  # ============================================
  # PaddleOCR - OCR 文字识别服务
  # ============================================
  paddleocr:
    image: paddlecloud/paddleocr:2.6-cpu-latest
    container_name: deepagent-paddleocr
    ports:
      - "${PADDLEOCR_PORT:-8868}:8868"
    volumes:
      - ./data/paddleocr:/paddle
    environment:
      - USE_GPU=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8868/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - deepagent-network

  # ============================================
  # MySQL - 业务数据存储 (可选)
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: deepagent-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pharma_db}
      MYSQL_USER: ${MYSQL_USER:-deepagent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deepagent123}
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - deepagent-network

# ============================================
# 注意：数据现在存储在 ./data/ 目录下
# 请确保该目录已添加到 .gitignore

# ============================================
# 网络
# ============================================
networks:
  deepagent-network:
    name: deepagent-network
    driver: bridge
